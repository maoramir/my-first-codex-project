<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בדיקת עסקת רכב</title>
  <style>
    :root {
      --bg-start: #f0f4ff;
      --bg-end: #e6fff8;
      --card: #ffffff;
      --text: #112136;
      --muted: #5c6f86;
      --line: #d6e0ee;
      --primary: #007a66;
      --primary-hover: #006554;
      --soft: #f4f8ff;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: 0 20px 50px rgba(19, 49, 76, 0.14);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid #c5d2e3;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 122, 102, 0.15);
    }

    button {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: linear-gradient(90deg, var(--primary), #00957d);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    table {
      width: 100%;
      margin-top: 16px;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    th, td {
      text-align: right;
      border-bottom: 1px solid #e5ecf5;
      padding: 10px 8px;
      font-size: 14px;
    }

    th {
      background: #ecf4ff;
      font-weight: 700;
    }

    a {
      color: var(--primary-hover);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>בדיקת עסקת רכב</h1>
    <p class="subtitle">רץ ישירות מ-GitHub Pages עם קובץ נתונים מקומי (ללא Render).</p>

    <form id="searchForm">
      <div class="form-grid">
        <label>יצרן
          <input name="manufacturer" value="Toyota" required />
        </label>
        <label>דגם
          <input name="model" value="Corolla" required />
        </label>
        <label>מחיר
          <input name="price" type="number" value="120000" min="0" />
        </label>
        <label>ק"מ
          <input name="km" type="number" value="90000" min="0" />
        </label>
        <label>נפח מנוע
          <input name="engine_volume" type="number" step="0.1" placeholder="לדוגמה 1.6" />
        </label>
        <label>סוג מנוע
          <input name="engine_type" value="hybrid" />
        </label>
        <label>תיבת הילוכים
          <input name="gearbox" value="automatic" />
        </label>
        <label>בעלות
          <input name="ownership" type="number" value="1" min="0" />
        </label>
        <label>שנה
          <input name="year" type="number" value="2019" />
        </label>
        <label>מספר תוצאות
          <input name="result_limit" type="number" value="10" min="1" max="50" />
        </label>
      </div>
      <button type="submit">בדוק עסקה</button>
    </form>

    <div class="hint">שדות יצרן ודגם הם חובה וזהות מלאה. ציון מבוסס על ק"מ, שנה ובעלות.</div>
    <div class="status" id="status"></div>

    <table id="resultsTable" hidden>
      <thead>
        <tr>
          <th>ציון</th>
          <th>כותרת</th>
          <th>מחיר</th>
          <th>שנה</th>
          <th>ק"מ</th>
          <th>בעלות</th>
          <th>קישור</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const CSV_URL = "./data/car_ads.csv";
    const form = document.getElementById("searchForm");
    const statusEl = document.getElementById("status");
    const table = document.getElementById("resultsTable");
    const tbody = table.querySelector("tbody");
    let adsPromise = null;

    const toNum = (value) => (value === "" ? null : Number(value));
    const norm = (value) => (value ?? "").toString().trim().toLowerCase();

    function safeNorm(value, minValue, maxValue) {
      if (maxValue <= minValue) return 1;
      return (value - minValue) / (maxValue - minValue);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === "\"") {
          if (inQuotes && next === "\"") {
            cell += "\"";
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (ch === "," && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((ch === "\n" || ch === "\r") && !inQuotes) {
          if (ch === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some((v) => v.length > 0)) rows.push(row);
          row = [];
          cell = "";
          continue;
        }

        cell += ch;
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        if (row.some((v) => v.length > 0)) rows.push(row);
      }

      if (rows.length === 0) return [];
      const headers = rows[0];
      return rows.slice(1).map((r) => {
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = r[idx] ?? "";
        });
        return obj;
      });
    }

    async function loadAds() {
      if (!adsPromise) {
        adsPromise = fetch(CSV_URL)
          .then((res) => {
            if (!res.ok) throw new Error("לא ניתן לטעון קובץ נתונים");
            return res.text();
          })
          .then((csvText) => parseCsv(csvText))
          .then((rows) =>
            rows.map((r) => ({
              ...r,
              year: toNum(r.year),
              price: toNum(r.price),
              km: toNum(r.km),
              owners: toNum(r.owners),
              engine_volume: toNum(r.engine_volume),
            }))
          );
      }
      return adsPromise;
    }

    function renderResults(items) {
      tbody.innerHTML = "";
      items.forEach((item) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${(item.similarity_score ?? 0).toFixed(4)}</td>
          <td>${item.title ?? ""}</td>
          <td>${item.price ?? ""}</td>
          <td>${item.year ?? ""}</td>
          <td>${item.km ?? ""}</td>
          <td>${item.owners ?? ""}</td>
          <td><a href="${item.url}" target="_blank" rel="noopener">למודעה</a></td>
        `;
        tbody.appendChild(tr);
      });
      table.hidden = items.length === 0;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.textContent = "טוען ומחשב...";
      table.hidden = true;
      tbody.innerHTML = "";

      try {
        const rows = await loadAds();
        const fd = new FormData(form);
        const manufacturer = norm(fd.get("manufacturer"));
        const model = norm(fd.get("model"));
        const price = toNum(fd.get("price"));
        const km = toNum(fd.get("km"));
        const year = toNum(fd.get("year"));
        const ownership = toNum(fd.get("ownership"));
        const gearbox = norm(fd.get("gearbox"));
        const engineType = norm(fd.get("engine_type"));
        const engineVolume = toNum(fd.get("engine_volume"));
        const limit = Math.max(1, Math.min(toNum(fd.get("result_limit")) || 10, 50));

        let filtered = rows.filter((r) => {
          if (norm(r.manufacturer) !== manufacturer) return false;
          if (norm(r.model) !== model) return false;
          if (price !== null && !(r.price <= price)) return false;
          if (km !== null && !(r.km <= km)) return false;
          if (year !== null && !(r.year >= year)) return false;
          if (ownership !== null && !(r.owners <= ownership)) return false;
          if (gearbox && norm(r.gearbox) !== gearbox) return false;
          if (engineType && norm(r.fuel_type) !== engineType) return false;
          if (engineVolume !== null && r.engine_volume !== null) {
            if (Math.abs(r.engine_volume - engineVolume) > 0.2) return false;
          }
          return true;
        });

        if (filtered.length === 0) {
          statusEl.textContent = "לא נמצאו תוצאות";
          renderResults([]);
          return;
        }

        const minYear = Math.min(...filtered.map((r) => r.year));
        const maxYear = Math.max(...filtered.map((r) => r.year));
        const minKm = Math.min(...filtered.map((r) => r.km));
        const maxKm = Math.max(...filtered.map((r) => r.km));
        const ownersForRange = filtered.map((r) => (r.owners ?? 99));
        const minOwners = Math.min(...ownersForRange);
        const maxOwners = Math.max(...ownersForRange);

        filtered = filtered
          .map((r) => {
            const ownersValue = r.owners ?? maxOwners;
            const yearScore = safeNorm(r.year, minYear, maxYear);
            const kmScore = 1 - safeNorm(r.km, minKm, maxKm);
            const ownersScore = 1 - safeNorm(ownersValue, minOwners, maxOwners);
            const similarityScore = 0.45 * kmScore + 0.35 * yearScore + 0.20 * ownersScore;
            return { ...r, similarity_score: similarityScore };
          })
          .sort((a, b) => b.similarity_score - a.similarity_score)
          .slice(0, limit);

        statusEl.textContent = `נמצאו ${filtered.length} תוצאות`;
        renderResults(filtered);
      } catch (error) {
        statusEl.textContent = `שגיאה: ${error.message}`;
      }
    });
  </script>
</body>
</html>
