<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Matcher</title>
  <style>
    :root {
      --bg-start: #fff4cc;
      --bg-end: #ffd166;
      --card: #fff8e8;
      --text: #4a1208;
      --muted: #7a3a0f;
      --line: #f4bb66;
      --primary: #d62828;
      --primary-hover: #a81616;
      --soft: #ffe8b8;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(214, 40, 40, 0.22);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: 0 20px 50px rgba(131, 27, 11, 0.2);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid #f0aa58;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(214, 40, 40, 0.2);
    }

    button {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: linear-gradient(90deg, var(--primary), #f77f00);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.2s ease;
    }

    button:hover {
      filter: brightness(0.97);
      transform: translateY(-1px);
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    table {
      width: 100%;
      margin-top: 16px;
      border-collapse: collapse;
      border: 1px solid var(--line);
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
    }

    th, td {
      text-align: right;
      border-bottom: 1px solid #f7d8a8;
      padding: 10px 8px;
      font-size: 14px;
    }

    th {
      background: #ffe2a8;
      font-weight: 700;
    }

    tr:hover td {
      background: #fff2d2;
    }

    a {
      color: var(--primary-hover);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      th, td {
        font-size: 13px;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>בדיקת עסקת רכב</h1>
    <p class="subtitle">ציון העסקה מתבסס על ק"מ, שנה ובעלות. יצרן ודגם חייבים להיות זהים.</p>

    <form id="searchForm">
      <div class="form-grid">
        <label>יצרן
          <input name="manufacturer" value="Toyota" required />
        </label>
        <label>דגם
          <input name="model" value="Corolla" required />
        </label>
        <label>מחיר
          <input name="price" type="number" value="120000" min="0" />
        </label>
        <label>ק"מ
          <input name="km" type="number" value="90000" min="0" />
        </label>
        <label>נפח מנוע
          <input name="engine_volume" type="number" step="0.1" placeholder="לדוגמה 1.6" />
        </label>
        <label>סוג מנוע
          <input name="engine_type" value="hybrid" placeholder="בנזין / היברידי / דיזל / חשמלי" />
        </label>
        <label>תיבת הילוכים
          <input name="gearbox" value="automatic" />
        </label>
        <label>בעלות
          <input name="ownership" type="number" value="1" min="0" />
        </label>
        <label>שנה
          <input name="year" type="number" value="2019" />
        </label>
        <label>מספר תוצאות
          <input name="result_limit" type="number" value="10" min="1" max="50" />
        </label>
      </div>

      <button type="submit">בדוק עסקה</button>
    </form>

    <div class="hint">הערה: סינון נפח מנוע יעבוד כאשר קיימת עמודת engine_volume בקובץ הנתונים.</div>
    <div class="status" id="status"></div>

    <table id="resultsTable" hidden>
      <thead>
        <tr>
          <th>ציון</th>
          <th>כותרת</th>
          <th>מחיר</th>
          <th>שנה</th>
          <th>ק"מ</th>
          <th>בעלות</th>
          <th>קישור</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById("searchForm");
    const statusEl = document.getElementById("status");
    const table = document.getElementById("resultsTable");
    const tbody = table.querySelector("tbody");

    const toNum = (value) => (value === "" ? null : Number(value));
    const RENDER_API_BASE = "https://car-matcher-api.onrender.com";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "מחפש...";
      table.hidden = true;
      tbody.innerHTML = "";

      const data = new FormData(form);
      const isGithubPages = window.location.hostname.endsWith("github.io");
      const apiBase = isGithubPages ? RENDER_API_BASE : window.location.origin;
      const endpoint = `${apiBase.replace(/\/$/, "")}/search`;

      const payload = {
        hard_filters: {
          manufacturer: data.get("manufacturer"),
          model: data.get("model"),
          gearbox: data.get("gearbox") || null,
          fuel_type: data.get("engine_type") || null,
          engine_volume: toNum(data.get("engine_volume")),
        },
        range_filters: {
          year_min: toNum(data.get("year")),
          price_max: toNum(data.get("price")),
          km_max: toNum(data.get("km")),
          owners_max: toNum(data.get("ownership")),
        },
        result_limit: toNum(data.get("result_limit")) || 10,
      };

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const json = await res.json();

        if (!res.ok) {
          throw new Error(json.detail || "שגיאה לא צפויה");
        }

        statusEl.textContent = `נמצאו ${json.count} תוצאות`;

        json.results.forEach((item) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.similarity_score ?? ""}</td>
            <td>${item.title ?? ""}</td>
            <td>${item.price ?? ""}</td>
            <td>${item.year ?? ""}</td>
            <td>${item.km ?? ""}</td>
            <td>${item.owners ?? ""}</td>
            <td><a href="${item.url}" target="_blank" rel="noopener">למודעה</a></td>
          `;
          tbody.appendChild(tr);
        });

        table.hidden = false;
      } catch (err) {
        statusEl.textContent = `שגיאה: ${err.message}`;
      }
    });
  </script>
</body>
</html>
